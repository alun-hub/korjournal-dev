<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f14"/>
      <stop offset="100%" style="stop-color:#141c2a"/>
    </linearGradient>
    <!-- Green glow behind icon -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </radialGradient>
    <!-- Blue accent gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="125" x2="1024" y2="125" stroke="#1c2030" stroke-width="1"/>
  <line x1="0" y1="250" x2="1024" y2="250" stroke="#1c2030" stroke-width="1"/>
  <line x1="0" y1="375" x2="1024" y2="375" stroke="#1c2030" stroke-width="1"/>
  <line x1="256" y1="0" x2="256" y2="500" stroke="#1c2030" stroke-width="1"/>
  <line x1="512" y1="0" x2="512" y2="500" stroke="#1c2030" stroke-width="1"/>
  <line x1="768" y1="0" x2="768" y2="500" stroke="#1c2030" stroke-width="1"/>

  <!-- Route polyline (decorative, right side) -->
  <polyline points="620,460 660,380 700,320 760,290 820,260 870,200 900,140 920,80"
    fill="none" stroke="#3b82f6" stroke-width="3" stroke-opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Route dots -->
  <circle cx="620" cy="460" r="5" fill="#3b82f6" opacity="0.5"/>
  <circle cx="920" cy="80"  r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="760" cy="290" r="4" fill="#3b82f6" opacity="0.4"/>
  <circle cx="870" cy="200" r="4" fill="#3b82f6" opacity="0.4"/>

  <!-- Second faint route -->
  <polyline points="580,480 640,400 710,350 780,310 850,260 900,190 940,110"
    fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Glow circle behind icon -->
  <circle cx="240" cy="250" r="200" fill="url(#glow)"/>

  <!-- App icon (steering wheel) — centered left -->
  <!-- Icon background circle -->
  <circle cx="240" cy="250" r="112" fill="#141820" stroke="#1c2030" stroke-width="2"/>
  <!-- Rim -->
  <circle cx="240" cy="250" r="78" fill="none" stroke="#22c55e" stroke-width="14"/>
  <!-- Spokes -->
  <line x1="240" y1="172" x2="240" y2="220" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <line x1="240" y1="280" x2="240" y2="328" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <line x1="172" y1="211" x2="211" y2="234" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <line x1="269" y1="266" x2="308" y2="289" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <line x1="308" y1="211" x2="269" y2="234" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <line x1="211" y1="266" x2="172" y2="289" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <!-- Hub -->
  <circle cx="240" cy="250" r="16" fill="#22c55e"/>

  <!-- Accent line under app name -->
  <rect x="440" y="312" width="220" height="3" rx="2" fill="url(#blueGrad)" opacity="0.9"/>

  <!-- App name -->
  <text x="440" y="295"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="72" font-weight="700" fill="#dde" letter-spacing="-1">
    Körjournal
  </text>

  <!-- Tagline -->
  <text x="442" y="352"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="22" font-weight="400" fill="#778" letter-spacing="0.3">
    GPS · Milersättning · Trängselskatt
  </text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="442" y="385" width="130" height="34" rx="17" fill="#1c2030" stroke="#2a2e3a" stroke-width="1.5"/>
  <text x="507" y="407" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="15" font-weight="600" fill="#22c55e">
    Offline
  </text>
  <!-- Pill 2 -->
  <rect x="584" y="385" width="148" height="34" rx="17" fill="#1c2030" stroke="#2a2e3a" stroke-width="1.5"/>
  <text x="658" y="407" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="15" font-weight="600" fill="#3b82f6">
    Månadsrapport
  </text>
  <!-- Pill 3 -->
  <rect x="744" y="385" width="110" height="34" rx="17" fill="#1c2030" stroke="#2a2e3a" stroke-width="1.5"/>
  <text x="799" y="407" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="15" font-weight="600" fill="#aab">
    CSV-export
  </text>
</svg>
